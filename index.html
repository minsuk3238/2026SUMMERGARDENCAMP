  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 Summer Garden Camp</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 1. 기본 스타일 리셋 */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    html {
      scroll-behavior: smooth;
    }
    
    body {
      width: 100vw;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      background-color: #f7f9fc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    /* 2. 첫 화면 (게이트웨이) 완전 가운데 정렬 */
    .gateway-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 35px;
      width: 100%;
      height: 100vh;
      max-width: 400px;
      padding: 20px;
    }

    /* 3. 상단 메인 로고 스타일 및 Tailwind 충돌 방지 강제화 */
    .logo-wrapper {
      width: 100%;
      max-width: 280px;
      filter: drop-shadow(0px 8px 16px rgba(0, 0, 0, 0.06));
    }

    .logo-wrapper svg {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Tailwind가 색상을 덮어쓰지 못하도록 !important 적용 */
    #main-gateway-logo .logo-paint-green { fill: #18a300 !important; }
    #main-gateway-logo .logo-paint-white { fill: #ffffff !important; }
    #main-gateway-logo .logo-paint-blue { fill: #009eff !important; }
    #main-gateway-logo .logo-paint-yellow { fill: #ffff8d !important; }

    /* 4. 고정 텍스트 버튼 스타일 */
    .button-group {
      display: flex;
      width: 100%;
      gap: 16px;
    }

    .btn-text {
      flex: 1;
      padding: 16px 24px;
      font-size: 16px;
      font-weight: 600;
      text-align: center;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
    }

    .btn-ko {
      background-color: #2a9c39;
      color: #ffffff;
    }
    .btn-ko:hover {
      background-color: #227f2e;
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(42, 156, 57, 0.2);
    }

    .btn-en {
      background-color: #ffffff;
      color: #333333;
      border: 1px solid #e2e8f0;
    }
    .btn-en:hover {
      background-color: #f8fafc;
      color: #000000;
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.08);
    }

    .btn-text:active {
      transform: translateY(0);
    }

    /* 5. 상세페이지 이미지 노출 영역 및 투명 링크 컨테이너 */
    .page-view-section {
      display: none;
      position: relative;
      width: 100%;
      max-width: 500px;
      background-color: #ffffff;
      box-shadow: 0px 0px 20px rgba(0,0,0,0.05);
    }

    .page-view-section img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* 6. 이미지 위에 얹어질 버튼 박스 */
    .click-button {
      position: absolute;
      display: block;
      background-color: rgba(255, 255, 255, 0) !important;
      border: none !important;
      cursor: pointer;
      z-index: 10;
    }

    .link-left {
      left: 26.8% !important;    
      width: 19% !important;   
      height: 0.9% !important;  
    }

    .link-right {
      left: 54.3% !important;    
      width: 19% !important;   
      height: 0.9% !important;  
    }

    /* 번역 방어 핵심 스타일 */
    .responsive-text { 
        word-break: keep-all; 
        overflow-wrap: break-word;
    }
  </style>
</head>

    </div>

    <div class="button-group">
      <button onclick="loadPage('ko')" class="btn-text btn-ko">한글</button>
      <button onclick="loadPage('en')" class="btn-text btn-en">ENGLISH</button>
    </div>
  </div>

  <div id="pageView" class="page-view-section">
    <img id="pageImage" src="" alt="상세페이지">
    
    <button id="leftOverlayLink" onclick="clickLeftButton()" class="click-button link-left"></button>
    <button id="rightOverlayLink" onclick="clickRightButton()" class="click-button link-right"></button>
  </div>

  <div id="modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4 z-50 backdrop-blur-sm">
      <div class="bg-white rounded-3xl p-6 md:p-8 max-w-sm w-full shadow-2xl relative">
          <button onclick="closeModal()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 text-2xl">&times;</button>
          <div id="modal-icon" class="w-16 h-16 md:w-20 md:h-20 mx-auto rounded-full flex items-center justify-center mb-6 text-4xl md:text-5xl"></div>
          <h3 id="modal-title" class="text-xl md:text-2xl font-bold text-center mb-4 text-[#040000]"></h3>
          <p id="modal-desc" class="text-slate-600 text-center text-xs md:text-sm mb-6 italic leading-relaxed"></p>
          <div id="modal-content" class="text-slate-700 mb-8 space-y-4 text-xs md:text-sm bg-slate-50 p-4 md:p-6 rounded-2xl"></div>
          <a id="modal-link" href="#" target="_blank" class="block w-full text-center text-white py-3 md:py-4 rounded-xl font-bold hover:opacity-90 transition-opacity">바로가기</a>
      </div>
  </div>

  <script>
    let currentLang = 'ko';

    function loadPage(lang) {
      currentLang = lang;
      const viewSection = document.getElementById('pageView');
      const imgTarget = document.getElementById('pageImage');
      const leftLink = document.getElementById('leftOverlayLink');
      const rightLink = document.getElementById('rightOverlayLink');
      
      if (lang === 'ko') {
        imgTarget.src = '국문_모바일-상세페이지.png';
        leftLink.style.top = '15.5%';
        rightLink.style.top = '15.5%';
      } else if (lang === 'en') {
        imgTarget.src = '영문_모바일-상세페이지.png';
        leftLink.style.top = '15.3%';
        rightLink.style.top = '15.3%';
      }
      
      viewSection.style.display = 'block';
      
      setTimeout(() => {
        viewSection.scrollIntoView({ behavior: 'smooth' });
      }, 50);
    }

    // 왼쪽 버튼 (가든 스탬프 투어) 데이터 매핑
    function clickLeftButton() {
      if (currentLang === 'ko') {
        openModal(
          '가든 스탬프 투어', 
          'https://snoopy.jstamp.net/login', 
          '🐾', 
          '#008fd5', 
          '발바닥 모양을 눌러 스탬프를 찍고,<br>퀴즈를 풀어 스탬프를 모아보세요.', 
          [
            '카카오톡, Google, Apple 계정으로 로그인합니다.', 
            '스탬프 투어 메뉴를 클릭하세요.', 
            '발바닥 아이콘을 누르고, 가든 곳곳에 비치된 스탬프를 찍어보세요.', 
            '스탬프 8개를 모두 모으면, 스토어에서 소정의 기념품을 받을 수 있습니다.'
          ]
        );
      } else {
        // 💡 영문 버전일 때 목적지 주소 뒤에 ?lang=en 결합
        openModal(
          'Garden Stamp Tour', 
          'https://snoopy.jstamp.net/login?lang=en', 
          '🐾', 
          '#008fd5', 
          'Press the footprint to stamp,<br>solve quizzes, and collect stamps.', 
          [
            'Log in with Kakao, Google, or Apple accounts.', 
            'Click on the Stamp Tour menu.', 
            'Press the footprint icon and stamp at designated spots throughout the garden.', 
            'Collect all 8 stamps to get a small souvenir at the store.'
          ]
        );
      }
    }

    // 오른쪽 버튼 (가드너 클래스) 데이터 매핑
    function clickRightButton() {
      if (currentLang === 'ko') {
        openModal(
          '가드너 클래스: 나무 찾기 미션', 
          'https://plantclass.vercel.app', 
          '🌿', 
          '#2c9942', 
          '야외 가든 지도를 열고<br>반짝이는 핀을 찾아가세요!<br>나무 설명을 읽고 퀴즈를 풀어보세요!', 
          [
            '지도에 표시된 핀을 순서대로 따라가 보세요.', 
            '각 나무에 해당하는 퀴즈를 모두 풀어보세요.', 
            '최종 테스트를 완료하고 디지털 인증서를 받아보세요!', 
            '설문 완료 화면을 매표소에 제시하면 소정의 리워드를 수령할 수 있습니다.'
          ]
        );
      } else {
        // 💡 영문 버전일 때 목적지 주소 뒤에 ?lang=en 결합
        openModal(
          'Gardener Class: Tree Mission', 
          'https://plantclass.vercel.app/?lang=en', 
          '🌿', 
          '#2c9942', 
          'Open the outdoor garden map<br>and find the glowing pins!<br>Read tree descriptions and solve quizzes!', 
          [
            'Follow the pins on the map in sequence.', 
            'Solve all the quizzes for each tree.', 
            'Complete the final test to receive a digital certificate!', 
            'Present the survey completion screen at the ticket office to get a reward.'
          ]
        );
      }
    }

// 공용 모달 데이터 적용 및 노출
function openModal(title, url, icon, color, desc, steps) {
    const modal = document.getElementById('modal');
    document.getElementById('modal-title').innerText = title;
    document.getElementById('modal-desc').innerHTML = desc;
    document.getElementById('modal-link').href = url;
    document.getElementById('modal-icon').innerText = icon;
    
    // 💡 주석 처리 기호(//)를 꼭 붙여주세요!
    // 언어에 따라 버튼 텍스트 동적 변경 변경
    document.getElementById('modal-link').innerText = currentLang === 'ko' ? '바로가기' : 'GO';
    
    document.getElementById('modal-content').innerHTML = steps.map((step, index) => `
        <div class="flex items-start gap-3">
            <span class="flex-shrink-0 font-extrabold text-[10px] md:text-xs px-2 py-1 rounded-md bg-slate-200 text-slate-600">Step ${index + 1}</span>
            <span class="leading-relaxed break-keep text-slate-700 responsive-text">${step}</span>
        </div>
    `).join('');

    const iconEl = document.getElementById('modal-icon');
    iconEl.style.backgroundColor = color + '15';
    iconEl.style.color = color;
    document.getElementById('modal-link').style.backgroundColor = color;
    modal.classList.remove('hidden');
}

    function closeModal() { 
        document.getElementById('modal').classList.add('hidden'); 
    }
  </script>
</body>
